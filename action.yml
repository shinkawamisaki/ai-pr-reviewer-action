name: 'AI PR Reviewer (by Misaki)'
description: 'Strict, rule-based AI Pull Request Reviewer supporting Gemini, Claude, GPT-4o and more'
branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  github_token:
    description: 'GITHUB_TOKEN to comment on PRs'
    required: true
  model:
    description: 'AI model to use (e.g., "gemini/gemini-2.5-flash", "claude-opus-4-7", "gpt-4o")'
    required: false
    default: 'gemini/gemini-2.5-flash'
  gemini_api_key:
    description: 'API Key for Google AI Studio (required when using a Gemini model)'
    required: false
    default: ''
  anthropic_api_key:
    description: 'API Key for Anthropic Claude (required when using a Claude model)'
    required: false
    default: ''
  openai_api_key:
    description: 'API Key for OpenAI (required when using a GPT model)'
    required: false
    default: ''
  rules_file:
    description: 'Path to the repository rules file (e.g., .clinerules, CONTRIBUTING.md). Read from the PR base commit.'
    required: false
    default: '.clinerules'
  active_rules_file:
    description: 'Path to a precedents file (past human review decisions) that takes priority over the rules. Read from the PR base commit. Optional.'
    required: false
    default: ''
  prompt_file:
    description: 'Path to a custom review prompt template in your repository (placeholders: {{rules}}, {{active_rules}}, {{diff}}, {{language}}). Read from the PR base commit. Defaults to the prompt bundled with this action.'
    required: false
    default: ''
  strict_verify:
    description: 'Fail closed: when no verdict can be produced (injection, format drift, API outage), block the merge instead of passing. Set "false" to fail open.'
    required: false
    default: 'true'
  set_commit_status:
    description: 'Post a commit status (context: status_context) usable as a required status check. Requires "statuses: write" permission. Set "false" to disable.'
    required: false
    default: 'true'
  status_context:
    description: 'Context name of the commit status posted by this action.'
    required: false
    default: 'AI PR Reviewer'
  output_path:
    description: 'Path to save the review result as a file (e.g., review.md). Optional.'
    required: false
    default: ''
  exclude_patterns:
    description: 'Comma-separated glob patterns to ignore (e.g., "*.lock,dist/*,*.json").'
    required: false
    default: '*-lock.json,*-lock.yaml,*.lock,dist/*,node_modules/*,vendor/*'
  language:
    description: 'Language for the review comments (e.g., "ja-JP", "en-US").'
    required: false
    default: 'ja-JP'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.github_token }}
    AI_MODEL: ${{ inputs.model }}
    GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    RULES_FILE: ${{ inputs.rules_file }}
    ACTIVE_RULES_FILE: ${{ inputs.active_rules_file }}
    PROMPT_FILE: ${{ inputs.prompt_file }}
    STRICT_VERIFY: ${{ inputs.strict_verify }}
    SET_COMMIT_STATUS: ${{ inputs.set_commit_status }}
    STATUS_CONTEXT: ${{ inputs.status_context }}
    OUTPUT_PATH: ${{ inputs.output_path }}
    EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
    LANGUAGE: ${{ inputs.language }}
